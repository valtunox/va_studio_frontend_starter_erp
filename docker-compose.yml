services:
  frontend:
    container_name: studioapp-frontend-erp
    image: ${FRONTEND_IMAGE:-studioapp-frontend-erp:latest}
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3057:3057"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3057/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - studioapp-net-erp

  nginx:
    container_name: studioapp-nginx-erp
    image: ${NGINX_IMAGE:-studioapp-nginx-erp:latest}
    restart: unless-stopped
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        APP_PORT: 3057
        HTTP_PORT: 80
    ports:
      - "80:80"
      - "443:443"
    environment:
      - app_name=studioapp-frontend-erp
      - app_port=3057
    volumes:
      - ${SSL_CERTS_PATH:-./certs}:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - studioapp-net-erp

networks:
  studioapp-net-erp:
    driver: bridge
